name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  go:
    uses: ./.github/workflows/build-go.yml
  python:
    uses: ./.github/workflows/build-python.yml
  cpp:
    uses: ./.github/workflows/build-cpp.yml

  release:
    needs: [go, python, cpp]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all AppImage artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          # Without a pattern, download-artifact pulls *every* artifact,
          # including the .dockerbuild build-summary blobs that
          # docker/build-push-action@v6 attaches automatically. Restrict
          # to our AppImages.
          pattern: 'Hello*-x86_64.AppImage'

      - name: Layout artifacts
        run: |
          mkdir -p release
          find artifacts -name '*.AppImage' -exec cp -v {} release/ \;
          ls -la release/

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.AppImage
          generate_release_notes: true

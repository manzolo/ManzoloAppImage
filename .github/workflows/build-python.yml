name: Build Python AppImage

on:
  push:
    paths:
      - 'examples/02-python-gui/**'
      - 'docker/**'
      - 'scripts/**'
      - 'Makefile'
      - '.github/workflows/build-python.yml'
  pull_request:
    paths:
      - 'examples/02-python-gui/**'
      - 'docker/**'
      - 'scripts/**'
      - 'Makefile'
      - '.github/workflows/build-python.yml'
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build builder image (cached)
        uses: docker/build-push-action@v6
        with:
          context: docker
          tags: manzolo-appimage-builder:latest
          load: true
          cache-from: type=gha,scope=builder
          cache-to:   type=gha,scope=builder,mode=max

      - name: Build Python AppImage
        # Smoke test inside the container is skipped — we run Xvfb on the
        # host in the next step instead, so failures there are clearer.
        run: SKIP_SMOKE_TEST=1 make build-python

      - name: Smoke test (GUI under Xvfb)
        run: |
          sudo apt-get update && sudo apt-get install -y xvfb
          chmod +x out/HelloPython-x86_64.AppImage
          SMOKE_TEST_MS=2000 xvfb-run -a \
              env APPIMAGE_EXTRACT_AND_RUN=1 \
              ./out/HelloPython-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: HelloPython-x86_64.AppImage
          path: out/HelloPython-x86_64.AppImage
          if-no-files-found: error

name: Build Go AppImage

on:
  push:
    paths:
      - 'examples/01-go-cli/**'
      - 'docker/**'
      - 'scripts/**'
      - 'Makefile'
      - '.github/workflows/build-go.yml'
  pull_request:
    paths:
      - 'examples/01-go-cli/**'
      - 'docker/**'
      - 'scripts/**'
      - 'Makefile'
      - '.github/workflows/build-go.yml'
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build builder image (cached)
        uses: docker/build-push-action@v6
        with:
          context: docker
          tags: manzolo-appimage-builder:latest
          load: true
          cache-from: type=gha,scope=builder
          cache-to:   type=gha,scope=builder,mode=max

      - name: Build Go AppImage
        run: make build-go

      - name: Smoke test (CLI)
        run: |
          chmod +x out/HelloGo-x86_64.AppImage
          APPIMAGE_EXTRACT_AND_RUN=1 ./out/HelloGo-x86_64.AppImage --version
          APPIMAGE_EXTRACT_AND_RUN=1 ./out/HelloGo-x86_64.AppImage --name CI

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: HelloGo-x86_64.AppImage
          path: out/HelloGo-x86_64.AppImage
          if-no-files-found: error
